<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あなたのあわひ診断</title>
  <style>
    /* ===== リセット・基本 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #faf7f2;
      --warm:     #f5ede0;
      --sand:     #e8d9c4;
      --sage:     #b5c4b1;
      --sage-dark:#8aab85;
      --rosemist: #d4a5a5;
      --text:     #4a3f35;
      --text-sub: #7a6e65;
      --accent:   #c08b6e;
      --white:    #ffffff;
      --radius:   16px;
      --shadow:   0 4px 24px rgba(74,63,53,.10);
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ===== カード共通 ===== */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 560px;
      padding: 40px 32px;
      animation: fadeIn .4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== トップ装飾 ===== */
    .deco {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: .2em;
      color: var(--sage-dark);
    }
    .subtitle {
      text-align: center;
      font-size: .8rem;
      color: var(--text-sub);
      letter-spacing: .15em;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.5rem;
      text-align: center;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .lead {
      font-size: .9rem;
      line-height: 1.9;
      color: var(--text-sub);
      margin-bottom: 28px;
      text-align: center;
    }
    .note-small {
      font-size: .78rem;
      color: #aaa;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ===== ボタン ===== */
    .btn-start {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--sage-dark), var(--accent));
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .12em;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-start:hover { opacity: .88; }

    /* ===== プログレス ===== */
    .progress-wrap {
      width: 100%;
      max-width: 560px;
      margin-bottom: 16px;
    }
    .progress-label {
      font-size: .78rem;
      color: var(--text-sub);
      margin-bottom: 6px;
      text-align: right;
    }
    .progress-bar-bg {
      background: var(--sand);
      border-radius: 50px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--sage-dark), var(--accent));
      border-radius: 50px;
      transition: width .4s ease;
    }

    /* ===== 質問カード ===== */
    .q-number {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .18em;
      color: var(--sage-dark);
      margin-bottom: 10px;
    }
    .q-text {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .q-intent {
      font-size: .75rem;
      color: #bbb;
      margin-bottom: 20px;
    }

    /* ===== 選択肢 ===== */
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 20px;
      background: var(--cream);
      border: 2px solid transparent;
      border-radius: 12px;
      font-size: .92rem;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .15s;
    }
    .option-btn:hover {
      border-color: var(--sage);
      background: var(--warm);
      transform: translateX(4px);
    }
    .option-btn.selected {
      border-color: var(--sage-dark);
      background: #eef4ec;
    }
    .option-key {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      background: var(--sage);
      color: #fff;
      font-size: .8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .option-btn.selected .option-key {
      background: var(--sage-dark);
    }

    /* ===== ナビ ===== */
    .nav-row {
      display: flex;
      justify-content: space-between;
      margin-top: 28px;
      gap: 12px;
    }
    .btn-back {
      padding: 12px 24px;
      background: transparent;
      border: 2px solid var(--sand);
      border-radius: 50px;
      color: var(--text-sub);
      font-size: .9rem;
      cursor: pointer;
      transition: border-color .2s;
    }
    .btn-back:hover { border-color: var(--sage); }
    .btn-next {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, var(--sage-dark), var(--accent));
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .08em;
      cursor: pointer;
      transition: opacity .2s;
      opacity: .4;
      pointer-events: none;
    }
    .btn-next.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== 結果カード ===== */
    .result-badge {
      text-align: center;
      margin-bottom: 8px;
    }
    .result-badge span {
      display: inline-block;
      padding: 4px 18px;
      background: var(--warm);
      border-radius: 50px;
      font-size: .75rem;
      color: var(--accent);
      letter-spacing: .12em;
    }
    .result-type {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.5;
      margin: 12px 0 20px;
    }
    .result-desc {
      font-size: .9rem;
      line-height: 2;
      color: var(--text-sub);
      margin-bottom: 28px;
      padding: 20px;
      background: var(--cream);
      border-radius: 12px;
    }

    .section-title {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .2em;
      color: var(--sage-dark);
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--sand);
    }

    .list-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }
    .list-items li {
      font-size: .88rem;
      line-height: 1.7;
      padding-left: 20px;
      position: relative;
      color: var(--text);
    }
    .list-items li::before {
      content: '·';
      position: absolute;
      left: 6px;
      color: var(--sage-dark);
      font-size: 1.2rem;
      line-height: 1.4;
    }

    .catchphrase {
      margin: 28px 0 0;
      padding: 20px 24px;
      background: linear-gradient(135deg, #eef4ec, #faf0ea);
      border-radius: 12px;
      border-left: 4px solid var(--sage-dark);
      font-size: .92rem;
      font-weight: 700;
      line-height: 1.8;
      color: var(--text);
    }

    /* スコアバー */
    .score-area {
      margin: 28px 0;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .score-row-label {
      width: 80px;
      font-size: .78rem;
      color: var(--text-sub);
      flex-shrink: 0;
    }
    .score-bar-bg {
      flex: 1;
      background: var(--sand);
      border-radius: 50px;
      height: 8px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 50px;
      transition: width .8s ease .2s;
    }
    .score-bar-fill.tappuri   { background: #8aab85; }
    .score-bar-fill.sodatechuu{ background: #b5c4b1; }
    .score-bar-fill.sukuname  { background: #d4a5a5; }
    .score-bar-fill.busoku    { background: #c08b6e; }

    .score-num {
      width: 32px;
      text-align: right;
      font-size: .78rem;
      color: var(--text-sub);
      flex-shrink: 0;
    }

    /* CTAブロック */
    .cta-block {
      margin-top: 32px;
      padding: 28px 24px;
      background: linear-gradient(135deg, #f5f0e8, #eef4ec);
      border-radius: 16px;
      text-align: center;
    }
    .cta-block .cta-eyebrow {
      font-size: .72rem;
      letter-spacing: .2em;
      color: var(--sage-dark);
      margin-bottom: 10px;
    }
    .cta-block .cta-title {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 12px;
    }
    .cta-block .cta-body {
      font-size: .85rem;
      line-height: 1.9;
      color: var(--text-sub);
      margin-bottom: 20px;
    }
    .btn-cta {
      display: inline-block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--sage-dark), var(--accent));
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-cta:hover { opacity: .88; }

    /* 再挑戦ボタン */
    .btn-retry {
      display: block;
      width: 100%;
      margin-top: 32px;
      padding: 14px;
      background: transparent;
      border: 2px solid var(--sand);
      border-radius: 50px;
      color: var(--text-sub);
      font-size: .9rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-retry:hover { border-color: var(--sage); color: var(--text); }

    /* type color accent */
    .type-tappuri   .result-type { color: #5a8f55; }
    .type-sodatechuu .result-type { color: #7a9e76; }
    .type-sukuname  .result-type { color: #b47272; }
    .type-busoku    .result-type { color: #c08b6e; }

    /* hidden */
    .hidden { display: none !important; }

    /* footer */
    footer {
      margin-top: 32px;
      font-size: .72rem;
      color: #ccc;
      text-align: center;
    }

    @media (max-width: 400px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- ===== トップ画面 ===== -->
<div id="screen-top" class="card">
  <div class="deco">— あわひ —</div>
  <p class="subtitle">AWAHI SHINDAN</p>
  <h1>あなたのあわひ診断</h1>
  <p class="lead">
    今の自分に、どれくらい"あわひ"がありますか？<br>
    7つの質問で、あなたの今をやさしく見つめます。
  </p>
<button class="btn-start" onclick="startQuiz()">診断をはじめる</button>
</div>

<!-- ===== 質問画面 ===== -->
<div id="screen-quiz" class="hidden" style="width:100%;max-width:560px;">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="prog-label">1 / 7</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar" id="prog-bar" style="width:0%"></div>
    </div>
  </div>
  <div class="card" id="q-card">
    <p class="q-number" id="q-number">Q1</p>
    <p class="q-text" id="q-text"></p>
    <div class="options" id="options-wrap"></div>
    <div class="nav-row">
      <button class="btn-back" id="btn-back" onclick="goBack()">← もどる</button>
      <button class="btn-next" id="btn-next" onclick="goNext()">次へ →</button>
    </div>
  </div>
</div>

<!-- ===== 結果画面 ===== -->
<div id="screen-result" class="hidden card">
  <!-- JS で内容を生成 -->
</div>

<footer>© あわひ診断</footer>

<script>

const TYPE_LABELS = {
  tappuri: "あわひたっぷり",
  sodatechuu: "あわひ育て中",
  sukuname: "あわひ少なめ",
  busoku: "あわひ不足"
};

/* ============================================================
   状態
============================================================ */
let currentQ = 0;
let answers = []; // index → {type, space, connection, weight}

/* ============================================================
   画面切り替え
============================================================ */
function show(id) {
  ['screen-top','screen-quiz','screen-result'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

/* ============================================================
   スタート
============================================================ */
function startQuiz() {
  currentQ = 0;
  answers = [];
  show('screen-quiz');
  renderQuestion();
}

/* ============================================================
   質問描画
============================================================ */
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  // プログレス
  document.getElementById('prog-label').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('prog-bar').style.width = `${((currentQ + 1) / total) * 100}%`;

  // 番号・テキスト
  document.getElementById('q-number').textContent = `Q${currentQ + 1}`;
  document.getElementById('q-text').textContent = q.text;

  // 選択肢
  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (answers[currentQ] && answers[currentQ].key === opt.key) {
      btn.classList.add('selected');
    }
    btn.innerHTML = `<span class="option-key">${opt.key}</span><span>${opt.label}</span>`;
    btn.addEventListener('click', () => selectOption(opt, btn));
    wrap.appendChild(btn);
  });

  // 戻るボタン
  document.getElementById('btn-back').style.visibility = currentQ === 0 ? 'hidden' : 'visible';

  // 次へボタン
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentQ === total - 1 ? '結果を見る ✦' : '次へ →';
  btnNext.classList.toggle('active', !!answers[currentQ]);

  // カードアニメ
  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeIn .35s ease'; });
}

/* ============================================================
   選択
============================================================ */
function selectOption(opt, btn) {
  const q = QUESTIONS[currentQ];
  answers[currentQ] = { key: opt.key, type: opt.type, space: opt.space, connection: opt.connection, weight: q.weight };

  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('btn-next').classList.add('active');

  // 選択後、少し間をおいて自動で次へ進む
  setTimeout(() => { goNext(); }, 400);
}

/* ============================================================
   ナビ
============================================================ */
function goNext() {
  if (!answers[currentQ]) return;
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
  else { show('screen-top'); }
}

/* ============================================================
   判定ロジック
============================================================ */
function calcResult() {
  const typeScore = { tappuri: 0, sodatechuu: 0, sukuname: 0, busoku: 0 };
  let spaceScore = 0, connectionScore = 0;
  const totalWeight = 9;

  answers.forEach(a => {
    typeScore[a.type] += a.weight;
    spaceScore += a.space * a.weight;
    connectionScore += a.connection * a.weight;
  });

  const maxScore = Math.max(...Object.values(typeScore));
  const candidates = Object.keys(typeScore).filter(k => typeScore[k] === maxScore);

  let result;
  if (candidates.length === 1) {
    result = candidates[0];
  } else {
    const avgSpace = spaceScore / totalWeight;
    const avgConn  = connectionScore / totalWeight;
    const protos = { tappuri:{space:2,connection:2}, sodatechuu:{space:1,connection:2}, sukuname:{space:1,connection:1}, busoku:{space:0,connection:0} };

    result = candidates.sort((a, b) => {
      const da = Math.abs(avgSpace - protos[a].space) + Math.abs(avgConn - protos[a].connection);
      const db = Math.abs(avgSpace - protos[b].space) + Math.abs(avgConn - protos[b].connection);
      return da - db;
    })[0];

    // それでも同点ならQ5→Q6→Q1優先
    if (result === undefined) {
      for (const qi of [4, 5, 0]) {
        if (answers[qi] && candidates.includes(answers[qi].type)) {
          result = answers[qi].type;
          break;
        }
      }
    }
  }

  return { result, typeScore, totalWeight };
}

/* ============================================================
   結果表示
============================================================ */
function showResult() {
  const { result, typeScore, totalWeight } = calcResult();
  const t = TYPES[result];

  const makeList = (items) =>
    `<ul class="list-items">${items.map(i => `<li>${i}</li>`).join('')}</ul>`;

  const bars = ['tappuri','sodatechuu','sukuname','busoku'].map(k => `
    <div class="score-row">
      <span class="score-row-label">${TYPE_LABELS[k]}</span>
      <div class="score-bar-bg">
        <div class="score-bar-fill ${k}" style="width:0%" data-val="${Math.round(typeScore[k]/totalWeight*100)}"></div>
      </div>
      <span class="score-num">${typeScore[k]}pt</span>
    </div>
  `).join('');

  const el = document.getElementById('screen-result');
  el.className = `card type-${result}`;
  el.innerHTML = `
    <div class="result-badge"><span>診断結果</span></div>
    <p class="result-type">あなたは「${t.label}」タイプ</p>
    <div class="result-desc">${t.desc.replace(/\n/g,'<br>')}</div>

    <p class="section-title">✦ 今のあなたの特徴</p>
    ${makeList(t.features)}

    <p class="section-title">✦ あなたの強み</p>
    ${makeList(t.strengths)}

    <p class="section-title">✦ つまずきやすい点</p>
    ${makeList(t.stumbles)}

    <p class="section-title">✦ おすすめ行動</p>
    ${makeList(t.actions)}

    <p class="section-title">✦ あなたへのメッセージ</p>
    <div class="catchphrase">${t.catchphrase}</div>

    <div class="cta-block">
      <p class="cta-eyebrow">— あわひアカデミー —</p>
      <p class="cta-title">${t.ctaTitle}</p>
      <p class="cta-body">${t.ctaBody}</p>
      <a class="btn-cta" href="https://utage-system.com/page/AosKTdNK1Yy2" target="_blank" rel="noopener">あわひアカデミーをのぞいてみる</a>
    </div>

    <button class="btn-retry" onclick="startQuiz()">もう一度診断する</button>
  `;

  show('screen-result');
}
</script>
